<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WiseAgent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #080808;
      --surface:     #111111;
      --surface-2:   #181818;
      --border:      #222222;
      --border-hi:   #3a3a3a;
      --text:        #e6e6e6;
      --text-dim:    #888888;
      --text-muted:  #444444;
      --green:       #22c55e;
      --red:         #ef4444;
      --white:       #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--text);
    }

    .layout {
      display: grid;
      grid-template-columns: 400px 1fr;
      width: 100%;
      max-width: 1080px;
      border: 1px solid var(--border);
      background: var(--border);
      gap: 1px;
    }

    .panel {
      background: var(--surface);
      padding: 48px 44px;
    }

    /* ── Header ── */
    .panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .panel-icon { color: var(--text-dim); display: flex; }

    .panel-header h2 {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .panel-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* ── Number display ── */
    .number-display {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
      min-height: 52px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      white-space: nowrap;
    }

    .number-display.empty {
      color: var(--text-muted);
      font-size: 18px;
      letter-spacing: 0.02em;
      padding-top: 8px;
    }

    /* ── Dialpad ── */
    .dialpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      margin-bottom: 1px;
    }

    .dial-key {
      background: var(--surface);
      border: none;
      color: var(--text);
      font-family: inherit;
      padding: 20px 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.08s;
      user-select: none;
      -webkit-user-select: none;
    }

    .dial-key:hover  { background: var(--surface-2); }
    .dial-key:active { background: var(--border); }

    .dial-main {
      font-size: 20px;
      font-weight: 400;
      line-height: 1;
    }

    .dial-sub {
      font-size: 8.5px;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      min-height: 11px;
    }

    /* ── Call action row ── */
    .dial-actions {
      display: grid;
      grid-template-columns: 1fr 56px;
      gap: 1px;
      background: var(--border);
    }

    .btn-call {
      background: var(--green);
      border: none;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 18px 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.1s;
    }

    .btn-call:hover:not(:disabled) { background: #16a34a; }
    .btn-call:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-del {
      background: var(--surface);
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.08s;
    }

    .btn-del:hover { background: var(--surface-2); }
    .btn-del:active { background: var(--border); }

    #call-status {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding-top: 16px;
      min-height: 36px;
      letter-spacing: 0.01em;
    }

    /* ── URL input ── */
    input[type="url"] {
      width: 100%;
      padding: 13px 16px;
      font-size: 14px;
      font-family: inherit;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
      -webkit-appearance: none;
      border-radius: 0;
    }

    input[type="url"]::placeholder { color: var(--text-muted); }
    input[type="url"]:focus { border-color: var(--border-hi); }

    /* ── Ingest button ── */
    .btn-ingest {
      width: 100%;
      padding: 14px 20px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: inherit;
      background: var(--white);
      color: #000;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-ingest:hover:not(:disabled) { opacity: 0.88; }
    .btn-ingest:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── Progress ── */
    .progress-wrap {
      height: 1px;
      background: var(--border);
      margin-bottom: 24px;
      display: none;
    }

    .progress-wrap.visible { display: block; }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 0.35s ease;
    }

    .progress-bar.error { background: var(--red); }

    /* ── Log feed ── */
    .log-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .log-feed {
      max-height: 340px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .log-feed::-webkit-scrollbar { width: 2px; }
    .log-feed::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      font-size: 12.5px;
      color: var(--text-muted);
      line-height: 1.55;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .log-entry:last-child { border-bottom: none; }
    .log-entry.active    { color: var(--text); }
    .log-entry.success   { color: var(--text-dim); }
    .log-entry.error-entry { color: var(--red); }

    .log-dot {
      width: 4px;
      height: 4px;
      flex-shrink: 0;
      margin-top: 6px;
      background: var(--border-hi);
    }

    .log-entry.active    .log-dot { background: var(--white); }
    .log-entry.success   .log-dot { background: var(--green); }
    .log-entry.error-entry .log-dot { background: var(--red); }
  </style>
</head>
<body>
  <div class="layout">

    <!-- ── Call Panel ── -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.5 19.79 19.79 0 012 2.84 2 2 0 014 .82h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </div>
        <h2>WiseAgent</h2>
      </div>
      <p class="panel-sub">Enter a number — the agent will call you.</p>

      <div id="number-display" class="number-display empty">+_ _ _ _ _ _ _ _ _ _</div>

      <div class="dialpad">
        <button class="dial-key" onclick="dialPress('1')"><span class="dial-main">1</span><span class="dial-sub"></span></button>
        <button class="dial-key" onclick="dialPress('2')"><span class="dial-main">2</span><span class="dial-sub">ABC</span></button>
        <button class="dial-key" onclick="dialPress('3')"><span class="dial-main">3</span><span class="dial-sub">DEF</span></button>
        <button class="dial-key" onclick="dialPress('4')"><span class="dial-main">4</span><span class="dial-sub">GHI</span></button>
        <button class="dial-key" onclick="dialPress('5')"><span class="dial-main">5</span><span class="dial-sub">JKL</span></button>
        <button class="dial-key" onclick="dialPress('6')"><span class="dial-main">6</span><span class="dial-sub">MNO</span></button>
        <button class="dial-key" onclick="dialPress('7')"><span class="dial-main">7</span><span class="dial-sub">PQRS</span></button>
        <button class="dial-key" onclick="dialPress('8')"><span class="dial-main">8</span><span class="dial-sub">TUV</span></button>
        <button class="dial-key" onclick="dialPress('9')"><span class="dial-main">9</span><span class="dial-sub">WXYZ</span></button>
        <button class="dial-key" onclick="dialPress('*')"><span class="dial-main">*</span><span class="dial-sub"></span></button>
        <button class="dial-key" id="key-0" onclick="dialPress('0')"><span class="dial-main">0</span><span class="dial-sub">+</span></button>
        <button class="dial-key" onclick="dialPress('#')"><span class="dial-main">#</span><span class="dial-sub"></span></button>
      </div>

      <div class="dial-actions">
        <button class="btn-call" id="call-btn" onclick="makeCall()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 11.5 19.79 19.79 0 012 2.84 2 2 0 014 .82h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Call
        </button>
        <button class="btn-del" onclick="dialDelete()" title="Delete">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="square" stroke-linejoin="miter">
            <polyline points="21 4 8 4 1 12 8 20 21 20 21 4"/>
            <line x1="18" y1="9" x2="13" y2="14"/>
            <line x1="13" y1="9" x2="18" y2="14"/>
          </svg>
        </button>
      </div>

      <div id="call-status"></div>
    </div>

    <!-- ── Knowledge Base Panel ── -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
        </div>
        <h2>Knowledge Base</h2>
      </div>
      <p class="panel-sub">Paste a Wise Help article URL to index it into the agent's knowledge.</p>

      <input
        id="ingest-url"
        type="url"
        placeholder="https://wise.com/help/articles/..."
      />
      <button class="btn-ingest" id="ingest-btn" onclick="startIngestion()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square" stroke-linejoin="miter">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <polyline points="19 12 12 19 5 12"/>
        </svg>
        Start Ingestion
      </button>

      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div class="log-label">Activity</div>
      <div class="log-feed" id="log-feed"></div>
    </div>

  </div>

  <script>
    // ── Dialpad ────────────────────────────────────────────────────────────────
    let dialNumber = "";

    function updateDisplay() {
      const el = document.getElementById("number-display");
      if (dialNumber) {
        el.textContent = dialNumber;
        el.classList.remove("empty");
      } else {
        el.textContent = "+_ _ _ _ _ _ _ _ _ _";
        el.classList.add("empty");
      }
    }

    function dialPress(key) {
      if (dialNumber.length >= 16) return;
      if (dialNumber === "") dialNumber = "+";
      dialNumber += key;
      updateDisplay();
    }

    function dialDelete() {
      if (!dialNumber) return;
      dialNumber = dialNumber.slice(0, -1);
      updateDisplay();
    }

    // Long-press 0 → insert + prefix
    let holdTimer = null;
    const key0 = document.getElementById("key-0");
    key0.addEventListener("mousedown", () => {
      holdTimer = setTimeout(() => {
        if (!dialNumber) { dialNumber = "+"; updateDisplay(); }
        holdTimer = null;
      }, 600);
    });
    key0.addEventListener("mouseup",    () => clearTimeout(holdTimer));
    key0.addEventListener("mouseleave", () => clearTimeout(holdTimer));

    // Keyboard input
    document.addEventListener("keydown", e => {
      if (document.activeElement.tagName === "INPUT") return;
      if (/^[0-9*#]$/.test(e.key)) dialPress(e.key);
      else if (e.key === "Backspace") dialDelete();
      else if (e.key === "Enter") makeCall();
      else if (e.key === "+") { if (!dialNumber) { dialNumber = "+"; updateDisplay(); } }
    });

    // ── Call ───────────────────────────────────────────────────────────────────
    async function makeCall() {
      const phone = dialNumber.trim();
      const status = document.getElementById("call-status");
      const btn = document.getElementById("call-btn");

      if (!phone || phone === "+") { status.textContent = "Enter a phone number."; return; }

      btn.disabled = true;
      status.textContent = "Initiating call...";

      try {
        const res = await fetch("/call", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to: phone }),
        });
        const data = await res.json();
        status.textContent = data.message || data.error;
      } catch {
        status.textContent = "Connection failed.";
      } finally {
        btn.disabled = false;
      }
    }

    // ── Ingestion ──────────────────────────────────────────────────────────────
    async function startIngestion() {
      const url = document.getElementById("ingest-url").value.trim();
      const btn = document.getElementById("ingest-btn");
      const feed = document.getElementById("log-feed");
      const bar = document.getElementById("progress-bar");
      const wrap = document.getElementById("progress-wrap");

      if (!url) { addLog("Enter a URL first.", 0, true); return; }

      btn.disabled = true;
      feed.innerHTML = "";
      bar.style.width = "0%";
      bar.className = "progress-bar";
      wrap.classList.add("visible");

      try {
        const response = await fetch("/ingest", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url }),
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            try {
              const data = JSON.parse(line.slice(6));
              addLog(data.message, data.progress, data.error);
              bar.style.width = data.progress + "%";
              if (data.error) bar.className = "progress-bar error";
            } catch (_) {}
          }
        }
      } catch (e) {
        addLog("Connection error: " + e.message, 0, true);
        bar.className = "progress-bar error";
      } finally {
        btn.disabled = false;
      }
    }

    function addLog(message, progress, isError) {
      const feed = document.getElementById("log-feed");

      const prev = feed.querySelector(".log-entry.active");
      if (prev) {
        prev.classList.remove("active");
        if (!prev.classList.contains("error-entry")) prev.classList.add("success");
      }

      const entry = document.createElement("div");
      const isDone = progress >= 100;
      const cls = isError ? "error-entry" : isDone ? "success" : "active";
      entry.className = `log-entry ${cls}`;
      entry.innerHTML = `<div class="log-dot"></div><span>${message}</span>`;
      feed.appendChild(entry);
      feed.scrollTop = feed.scrollHeight;
    }
  </script>
</body>
</html>
